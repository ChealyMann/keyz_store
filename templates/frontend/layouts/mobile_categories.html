<div id="mobile-category-menu" class="fixed inset-0 z-[100] hidden">
    <div id="category-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm opacity-0 transition-opacity duration-500">
    </div>

    <div class="fixed right-0 top-0 h-full w-[85%] max-w-sm bg-black shadow-2xl transform translate-x-full offcanvas-transition flex flex-col border-l border-zinc-800">

        <div class="flex justify-between items-center p-6 border-b border-zinc-800">
            <h2 class="text-xl font-bold text-white tracking-widest uppercase">Categories</h2>
            <button id="close-category-button" class="group p-2 rounded-full border border-zinc-800 hover:border-white text-zinc-400 hover:text-white transition-all duration-300">
                <svg class="w-5 h-5 transition-transform duration-300 group-hover:rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 no-scrollbar">
            <div class="grid grid-cols-2 gap-4">
                {% for category in categories %}
                <a href="{{ url_for('home.products', category_id=category.id) }}" class="group relative block aspect-square overflow-hidden rounded-xl bg-zinc-900 border border-zinc-800 hover:border-zinc-500 transition-all">
                    {% if category.image %}
                    <img src="{{ url_for('static', filename='images/' + category.image) }}"
                         alt="{{ category.name }}"
                         class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-80 group-hover:opacity-100">
                    {% else %}
                    <div class="absolute inset-0 flex items-center justify-center bg-zinc-950 text-zinc-800">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    {% endif %}

                    <div class="absolute inset-x-0 bottom-0 h-full bg-gradient-to-t from-black/90 via-black/30 to-transparent"></div>

                    <div class="absolute bottom-4 left-0 right-0 text-center px-2">
                        <span class="block text-xs font-bold text-white uppercase tracking-widest leading-tight break-words">{{ category.name }}</span>
                    </div>
                </a>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
