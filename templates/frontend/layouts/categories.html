<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-16 mt-12">
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-xs sm:text-sm font-bold text-white tracking-widest uppercase">Browse Categories</h2>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8">

        {% for category in categories %}
        <a href="{{ url_for('home.products', category_id=category.id) }}"
            class="group block bg-black rounded-2xl overflow-hidden border border-zinc-800 hover:border-zinc-500 transition-all duration-500 relative shadow-lg">
            <div class="relative w-full pb-[100%] md:pb-[80%] overflow-hidden bg-zinc-900">
                <img src="{{ url_for('static', filename='images/resized' + category.image) }}" alt="{{ category.name }}"
                    class="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:scale-105 group-hover:opacity-100 transition-all duration-700 ease-out">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
            </div>
            <div class="absolute bottom-0 left-0 right-0 p-4 md:p-6 text-center">
                <h3 class="text-xs md:text-base font-bold text-white tracking-widest uppercase">{{ category.name }}</h3>
            </div>
        </a>
        {% endfor %}

    </div>
</section>
