    <div class="grid grid-cols-4 h-16 items-center">

        <!-- Home -->
        <a href="{{ url_for('home.home') }}"
            class="flex flex-col items-center justify-center {{ 'text-white' if request.endpoint == 'home.home' else 'text-gray-500 hover:text-white' }} group">
