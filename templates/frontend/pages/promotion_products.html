{% extends "frontend/main.html" %}

{% block content %}

<div class="px-4 sm:px-6 lg:px-8 py-8 md:py-12 max-w-[1800px] mx-auto">

    <!-- ====================================== -->
    <!-- PAGE HEADER -->
    <!-- ====================================== -->
    <div class="mb-8 md:mb-10">
        <h1 class="text-2xl md:text-3xl font-black text-zinc-900 dark:text-white tracking-tight">
            Promotions
        </h1>

{#        <p class="mt-2 text-sm text-zinc-500">#}
{#            Discounted products and selected variant deals.#}
{#        </p>#}

        <div class="brand-title-line mt-3"></div>
    </div>


    <!-- ====================================== -->
    <!-- SEARCH BAR -->
    <!-- ====================================== -->
    <div class="mb-8">
        <div class="relative max-w-md mx-auto md:mx-0">

            <input
                type="text"
                id="searchInput"
                placeholder="Search promotions..."
                autocomplete="off"
                class="w-full bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-full py-3 pl-12 pr-12 text-sm text-zinc-900 dark:text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-900 dark:focus:border-white focus:ring-1 focus:ring-zinc-900 dark:focus:ring-white transition-all"
            >

            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-4 w-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    />
                </svg>
            </div>

            <div id="searchSpinner" class="absolute inset-y-0 right-0 pr-4 flex items-center hidden">
                <div class="animate-spin rounded-full h-4 w-4 border-2 border-zinc-600 border-t-white"></div>
            </div>

        </div>
    </div>


    <!-- ====================================== -->
    <!-- PROMOTION PRODUCTS -->
    <!-- Uses product_grid.html and product_card.html -->
    <!-- ====================================== -->
    <div id="promotionSections" class="space-y-12 transition-opacity duration-200">

        {% if products %}
            {% include 'frontend/layouts/product_grid.html' %}
        {% else %}
            <div class="text-center py-8">
                <p class="text-zinc-500 text-xs md:text-sm font-medium mb-5">
                    No active promotions.
                </p>

                <a
                    href="{{ url_for('home.products') }}"
                    class="inline-block border border-zinc-300 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 px-5 py-2 rounded-full text-[11px] font-semibold uppercase tracking-widest hover:bg-zinc-900 hover:text-white dark:hover:bg-white dark:hover:text-black hover:border-transparent dark:hover:border-white transition-colors"
                >
                    Browse Products
                </a>
            </div>
        {% endif %}

    </div>

</div>


<script>
    const searchInput = document.getElementById("searchInput");
    const promotionSections = document.getElementById("promotionSections");
    const spinner = document.getElementById("searchSpinner");

    let timeout = null;

    searchInput.addEventListener("input", (event) => {
        clearTimeout(timeout);

        const query = event.target.value.trim();

        spinner.classList.remove("hidden");
        promotionSections.style.opacity = "0.45";

        timeout = setTimeout(async () => {
            try {
                const response = await fetch(
                    `{{ url_for('home.promotions') }}?ajax=1&search=${encodeURIComponent(query)}`
                );

                if (!response.ok) {
                    throw new Error("Failed to fetch promotions");
                }

                const data = await response.json();

                if (data.html && data.html.trim() !== "") {
                    promotionSections.innerHTML = data.html;
                } else {
                    promotionSections.innerHTML = `
                        <div class="text-center py-8">
                            <p class="text-zinc-500 text-xs md:text-sm font-medium mb-5">
                                No promotions found.
                            </p>

                            <a
                                href="{{ url_for('home.products') }}"
                                class="inline-block border border-zinc-300 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 px-5 py-2 rounded-full text-[11px] font-semibold uppercase tracking-widest hover:bg-zinc-900 hover:text-white dark:hover:bg-white dark:hover:text-black hover:border-transparent dark:hover:border-white transition-colors"
                            >
                                Browse Products
                            </a>
                        </div>
                    `;
                }

            } catch (error) {
                console.error("Error fetching promotions:", error);

                promotionSections.innerHTML = `
                    <div class="py-8 text-center">
                        <p class="text-red-400 text-xs md:text-sm font-medium">
                            Failed to load promotions.
                        </p>
                    </div>
                `;
            } finally {
                spinner.classList.add("hidden");
                promotionSections.style.opacity = "1";
            }
        }, 300);
    });
</script>

{% endblock %}
