{% extends "frontend/main.html" %}

{% block content %}
<div class="px-4 py-8 md:py-16 pb-24 max-w-7xl mx-auto">
    <div class="mb-12 text-center md:text-left">
        <h1 class="text-2xl md:text-4xl font-bold text-white tracking-widest uppercase">Categories</h1>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
        {% for category in categories %}
        <a href="{{ url_for('home.products', category_id=category.id) }}"
           class="group relative block aspect-square overflow-hidden rounded-2xl bg-black border border-zinc-800 hover:border-zinc-500 transition-all duration-500 shadow-lg">

            <div class="absolute inset-0 w-full h-full bg-zinc-900">
                {% if category.image %}
                <img src="{{ url_for('static', filename='images/' + category.image) }}"
                     alt="{{ category.name }}"
                     class="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-700 group-hover:scale-105">
                {% else %}
                <div class="w-full h-full flex items-center justify-center text-zinc-800 group-hover:text-zinc-600 transition-colors">
                    <svg class="w-8 h-8 md:w-12 md:h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                {% endif %}
            </div>

            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent opacity-90 group-hover:opacity-100 transition-opacity"></div>

            <div class="absolute inset-0 flex flex-col justify-end p-4 md:p-6 text-center">
                <span class="block text-sm md:text-lg font-bold text-white tracking-widest uppercase break-words">{{ category.name }}</span>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
