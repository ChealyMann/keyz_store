<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyzstore - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpg" href="{{ url_for('static', filename='logo/keyz.jpg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center selection:bg-white selection:text-black p-4">

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="fixed top-5 right-5 space-y-2 z-50">
            {% for category, message in messages %}
                <div class="px-6 py-4 rounded-xl shadow-2xl border text-xs font-bold tracking-widest uppercase transition-all duration-300
                      {{ 'bg-white text-black border-white' if category == 'success' else 'bg-zinc-900 text-white border-zinc-700' }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
